plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.9.10'
    id 'org.jetbrains.kotlin.plugin.serialization' version '1.9.10'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "io.ktor:ktor-server-core-jvm:2.3.4"
    implementation "io.ktor:ktor-server-netty-jvm:2.3.4"
    implementation "io.ktor:ktor-server-content-negotiation-jvm:2.3.4"
    implementation "io.ktor:ktor-serialization-kotlinx-json-jvm:2.3.4"
    implementation "org.jetbrains.exposed:exposed-core:0.42.1"
    implementation "org.jetbrains.exposed:exposed-dao:0.42.1"
    implementation "org.jetbrains.exposed:exposed-jdbc:0.42.1"
    implementation "org.xerial:sqlite-jdbc:3.42.0.0"
    implementation "ch.qos.logback:logback-classic:1.4.11"
    
    testImplementation "org.jetbrains.kotlin:kotlin-test"
    testImplementation "io.ktor:ktor-server-tests-jvm:2.3.4"
}

test {
    useJUnitPlatform()
}
